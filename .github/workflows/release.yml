name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos-arm64
            artifact: attdown-macos-arm64
            ext: ""
          - os: ubuntu-latest
            name: linux-x64
            artifact: attdown-linux-x64
            ext: ""
          - os: windows-latest
            name: windows-x64
            artifact: attdown-windows-x64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --clean pyinstaller/attdown.spec

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p release
          cp "dist/attdown${{ matrix.ext }}" "release/${{ matrix.artifact }}${{ matrix.ext }}"

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "release/${{ matrix.artifact }}${{ matrix.ext }}"
          "./release/${{ matrix.artifact }}${{ matrix.ext }}" --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          release\${{ matrix.artifact }}${{ matrix.ext }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}${{ matrix.ext }}
          retention-days: 7

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -la release/

      - name: Generate SHA256 checksums
        run: |
          cd release
          shasum -a 256 * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}AttDown4Acumatica{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800"
      {% if csrf_token %}hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'{% endif %}>
  <nav class="bg-slate-900 text-white px-6 py-3 flex items-center gap-6">
    <a href="/" class="font-semibold">AttDown4Acumatica</a>
    <a href="/job/new" class="hover:underline">New job</a>
    {% if username %}
      <span class="ml-auto text-sm text-slate-300">{{ username }}</span>
      <a href="/oauth/logout" class="text-sm hover:underline">Log out</a>
    {% endif %}
  </nav>
  <main class="max-w-5xl mx-auto p-6">
    {% block body %}{% endblock %}
  </main>
</body>
</html>

# AP bill attachments for a date range. Bill is in the stock Default endpoint.

acumatica:
  base_url: ${ACU_URL}
  endpoint: Default/24.200.001
  auth:
    type: oauth_client_credentials
    client_id: ${ACU_CLIENT_ID}
    client_secret: ${ACU_CLIENT_SECRET}

output: ${OUTPUT_URI}
checkpoint: file:///data/.state.sqlite
concurrency: 4

jobs:
  - entity: Bill
    filter: "Date ge datetimeoffset'2025-01-01T00:00:00Z' and Status ne 'Draft'"
    path: "ap/{Vendor}/{ReferenceNbr}/{filename}"

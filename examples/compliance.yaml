# Annual compliance document export.
# Requires the Default endpoint to be extended to expose ComplianceDocument.
# See endpoint-extensions/ComplianceDocument.md.

acumatica:
  base_url: ${ACU_URL}
  endpoint: Default/24.200.001+1
  auth:
    type: oauth_client_credentials
    client_id: ${ACU_CLIENT_ID}
    client_secret: ${ACU_CLIENT_SECRET}

output: ${OUTPUT_URI}
checkpoint: file:///data/.state.sqlite
concurrency: 4

jobs:
  - entity: ComplianceDocument
    filter: "Date ge datetimeoffset'2025-01-01T00:00:00Z' and Status ne 'Void'"
    path: "compliance/{Vendor}/{Type}/{RefNbr}/{filename}"
